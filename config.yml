# basicTest
# Fix `TestAcc{pascalCaseResource}_basic`
# completeTest
# Fix `TestAcc{pascalCaseResource}_complete`
# validateFunc
# Check if `ValidateFunc` is applied correctly
# maxItems
# Check if `MaxItems` is applied correctly
# forceNew
# Check if `ForceNew` is applied correctly
# runParallelTest
# Codes according to test results
# propertyName2ListResource
# Check if list resource test is correct
# document
# Check if document is correct
# fixCommand
